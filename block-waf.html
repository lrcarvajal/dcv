<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso bloqueado</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#333;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box}
.card{max-width:640px;width:100%;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden}
.content{padding:32px 40px}
.logo{max-height:60px;margin-bottom:28px;display:block}
h1{font-size:26px;font-weight:800;margin:0 0 10px;color:#111}
p.subtitle{font-size:16px;margin:0 0 24px;color:#666}
hr{border:none;border-top:1px solid #e0e0e0;margin:0 0 20px}
.details{font-size:13px;color:#555;line-height:1.8}
.details b{color:#333}
.bar{height:6px;background:#7C3AED}
</style>
</head>
<body>
<div class="card">
<div class="content">
<img class="logo" src="https://lrcarvajal.github.io/dcv/deposito_central_de_valores_chile_logo.jpg" alt="DCV">
<h1>Estimado usuario</h1>
<p class="subtitle">Ha sido bloqueado por nuestra política de seguridad.</p>
<hr>
<div class="details">
cf-ray: <b>::RAY_ID::</b><br>
client-ip: <b>::CLIENT_IP::</b><br>
country: <b>::GEO::</b><br>
date: <b id="date"></b><br>
server: <b>cloudflare</b>
</div>
</div>
<div class="bar"></div>
</div>
<script>document.getElementById('date').textContent=new Date().toUTCString();</script>
</body>
</html>
