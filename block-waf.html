<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso bloqueado</title>
<style>
body{margin:0;font-family:-apple-system,'Segoe UI',Arial,Helvetica,sans-serif;background:#fafafa;color:#333;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box}
.card{position:relative;max-width:640px;width:100%;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.corner{position:absolute;width:26px;height:26px;border:4px solid #7C3AED;z-index:2}
.corner.tl{top:16px;left:16px;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.corner.br{bottom:16px;right:16px;border-left:none;border-top:none;border-radius:0 0 6px 0}
.content{padding:52px 48px 40px}
.logo{max-height:44px;margin-bottom:32px;display:block}
h1{font-size:28px;font-weight:800;margin:0 0 12px;color:#0a0a0a;letter-spacing:-0.3px}
p.subtitle{font-size:16px;margin:0 0 28px;color:#6b6b6b;line-height:1.5}
hr{border:none;border-top:1px solid #ececec;margin:0 0 24px}
.details{font-size:13px;color:#6b6b6b;line-height:2}
.details b{color:#0a0a0a;font-weight:600}
.bar{height:8px;background:linear-gradient(90deg,#4C1D95,#7C3AED,#A78BFA,#7C3AED,#4C1D95)}
</style>
</head>
<body>
<div class="card">
<div class="corner tl"></div>
<div class="corner br"></div>
<div class="content">
<img class="logo" src="https://lrcarvajal.github.io/dcv/deposito_central_de_valores_chile_logo.jpg" alt="DCV">
<h1>Estimado usuario</h1>
<p class="subtitle">Ha sido bloqueado por nuestra política de seguridad.</p>
<hr>
<div class="details">
Ray ID: <b>::RAY_ID::</b><br>
Tu IP: <b>::CLIENT_IP::</b><br>
Ubicación: <b>::GEO::</b><br>
Hora: <b id="date"></b>
</div>
</div>
<div class="bar"></div>
</div>
<script>
document.getElementById('date').textContent=new Date().toLocaleString('es-CL',{timeZone:'America/Santiago',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' (hora de Chile)';
</script>
</body>
</html>
